<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;line-height:1.5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;gap:14px}
.lang-row{display:flex;gap:8px;justify-content:flex-end;align-items:center}
.lang-btn{padding:8px 14px;font-size:13px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;cursor:pointer;color:#5f5e5a;font-weight:500}
.lang-btn.on{background:#e6f1fb;color:#0c447c;border-color:#85b7eb}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#888780;flex-shrink:0;margin-right:auto}
.sync-dot.online{background:#3b6d11}
.sync-dot.queued{background:#ba7517}
.screen{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.h1{font-size:20px;font-weight:600;margin:0;color:#1a1a1a}
.h2{font-size:16px;font-weight:600;margin:0;color:#1a1a1a}
.muted{font-size:13px;color:#5f5e5a;margin:0;line-height:1.55}
.input{width:100%;height:44px;padding:0 14px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;font-size:15px;font-family:inherit}
.input:focus{outline:none;border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.btn{height:48px;padding:0 16px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#185fa5;color:#fff;border-color:#185fa5}
.btn-secondary{background:#f1efe8;border-color:#d3d1c7}
.bar{height:8px;background:#f1efe8;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:#185fa5;transition:width .25s}
.q-card{padding:14px;border:1px solid #e8e6df;border-radius:10px;background:#fff;cursor:pointer;font-size:15px;line-height:1.5;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.q-card:active{background:#f5f5f0}
.q-card.sel{border:2px solid #185fa5;padding:13px;background:#e6f1fb}
.q-card.correct{border:2px solid #3b6d11;padding:13px;background:#eaf3de}
.q-card.wrong{border:2px solid #a32d2d;padding:13px;background:#fcebeb}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid #b4b2a9;flex-shrink:0;margin-top:2px;background:#fff}
.q-card.sel .dot{background:#185fa5;border-color:#185fa5}
.q-card.correct .dot{background:#3b6d11;border-color:#3b6d11}
.q-card.wrong .dot{background:#a32d2d;border-color:#a32d2d}
.score{font-size:48px;font-weight:600;text-align:center;margin:8px 0;color:#1a1a1a}
.pill{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600}
.pill-pass{background:#eaf3de;color:#27500a}
.pill-fail{background:#fcebeb;color:#791f1f}
.pill-info{background:#e6f1fb;color:#0c447c}
.feedback{font-size:13px;padding:12px 14px;border-radius:8px;background:#f5f5f0;color:#444441;line-height:1.55}
.rtl{direction:rtl;text-align:right}
.rtl .lang-row{justify-content:flex-start}
.rtl .sync-dot{margin-right:0;margin-left:auto}
.btn:disabled{opacity:.4;cursor:not-allowed}
.credit{text-align:center;font-size:12px;color:#888780;margin-top:6px;padding:8px 0;letter-spacing:.2px;direction:ltr}
@media (prefers-color-scheme: dark){
  body{background:#1a1a1a;color:#f5f5f0}
  .lang-btn{background:#2c2c2a;border-color:#444441;color:#b4b2a9}
  .lang-btn.on{background:#0c447c;color:#e6f1fb;border-color:#185fa5}
  .screen{background:#2c2c2a;border-color:#444441}
  .h1,.h2{color:#f5f5f0}
  .muted{color:#b4b2a9}
  .input{background:#1a1a1a;border-color:#444441;color:#f5f5f0}
  .btn{background:#2c2c2a;border-color:#444441;color:#f5f5f0}
  .btn-secondary{background:#1a1a1a}
  .q-card{background:#2c2c2a;border-color:#444441;color:#f5f5f0}
  .q-card.sel{background:#0c447c;border-color:#85b7eb}
  .q-card.correct{background:#173404;border-color:#97c459}
  .q-card.wrong{background:#501313;border-color:#f09595}
  .feedback{background:#1a1a1a;color:#b4b2a9}
  .bar{background:#444441}
  .score{color:#f5f5f0}
}
</style>
</head>

      {q:'होइस्ट रखरखाव कौन कर सकता है?',a:['साइट पर कोई भी कर्मचारी','केवल योग्य, प्रशिक्षित और अधिकृत तकनीशियन','सबसे छोटा कर्मचारी','केवल ड्राइवर'],c:1,e:'केवल सक्षम व्यक्ति (OSHA 1926.1427 / EN 14492) ही कर सकते हैं।'},
      {q:'रखरखाव पूरा होने पर, होइस्ट को सेवा में लौटाने से पहले:',a:['केवल टैग हटा दें','नो-लोड और रेटेड-लोड फंक्शन टेस्ट करें, परिणाम दर्ज करें, फिर LOTO हटाएँ','तुरंत पूरा भार उठाना शुरू करें','अगली शिफ्ट तक रुकें'],c:1,e:'दर्ज फंक्शन टेस्ट सुरक्षा की पुष्टि करता है। LOTO वही व्यक्ति हटाता है जिसने लगाया।'}
    ]}
};

const state = {lang:'en', screen:'start', name:'', id:'', idx:0, answers:[]};
const app = document.getElementById('app');
const root = document.getElementById('content');
const syncDot = document.getElementById('sync-dot');

function loadQueue(){ try{ return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch(e){ return []; } }
function saveQueue(q){ try{ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch(e){} }

function updateSyncDot(){
  const queue = loadQueue();
  const t = T[state.lang];
  if(!navigator.onLine){
    syncDot.className = 'sync-dot';
    syncDot.title = t.offline + (queue.length ? ' · ' + queue.length + ' ' + t.pending : '');
  } else if(queue.length > 0){
    syncDot.className = 'sync-dot queued';
    syncDot.title = queue.length + ' ' + t.pending;
  } else {
    syncDot.className = 'sync-dot online';
    syncDot.title = t.online;
  }
}

async function tryUploadQueue(){
  if(!navigator.onLine || !window.fbAddRecord) return;
  const queue = loadQueue();
  if(queue.length === 0) return;
  const remaining = [];
  for(const rec of queue){
    try{ await window.fbAddRecord(rec); }
    catch(e){ remaining.push(rec); }
  }
  saveQueue(remaining);
  updateSyncDot();
}

async function saveRecord(record){
  if(navigator.onLine && window.fbAddRecord){
    try{
      await window.fbAddRecord(record);
      tryUploadQueue();
      return 'uploaded';
    }catch(e){}
  }
  const queue = loadQueue();
  queue.push(record);
  saveQueue(queue);
  updateSyncDot();
  return 'queued';
}

window.addEventListener('online', tryUploadQueue);
window.addEventListener('online', updateSyncDot);
window.addEventListener('offline', updateSyncDot);
setInterval(tryUploadQueue, 30000);
setTimeout(()=>{ tryUploadQueue(); updateSyncDot(); }, 2000);

function applyDir(){
  app.classList.toggle('rtl', T[state.lang].dir==='rtl');
  document.documentElement.dir = T[state.lang].dir;
  document.documentElement.lang = state.lang;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function render(){
  applyDir();
  updateSyncDot();
  const t = T[state.lang];
  if(state.screen==='start') renderStart(t);
  else if(state.screen==='quiz') renderQuiz(t);
  else if(state.screen==='result') renderResult(t);
  else if(state.screen==='review') renderReview(t);
  window.scrollTo(0,0);
}

function renderStart(t){
  root.innerHTML = `
    <div class="screen">
      <p class="h1">${escapeHtml(t.title)}</p>
      <p class="muted">${escapeHtml(t.subtitle)}</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label class="muted">${escapeHtml(t.worker)}</label>
        <input class="input" id="f-name" placeholder="${escapeHtml(t.workerPh)}" value="${escapeHtml(state.name)}">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label class="muted">${escapeHtml(t.idLabel)}</label>
        <input class="input" id="f-id" placeholder="${escapeHtml(t.idPh)}" value="${escapeHtml(state.id)}">
      </div>
      <button class="btn btn-primary" id="b-start">${escapeHtml(t.start)}</button>
      <p class="muted" id="err" style="color:#a32d2d;display:none">${escapeHtml(t.nameReq)}</p>
    </div>
    <p class="credit">${escapeHtml(t.credit)}</p>`;
  document.getElementById('b-start').onclick=()=>{
    const n = document.getElementById('f-name').value.trim();
    const i = document.getElementById('f-id').value.trim();
    if(!n||!i){ document.getElementById('err').style.display='block'; return; }
    state.name=n; state.id=i; state.idx=0; state.answers=[]; state.screen='quiz'; render();
  };
}

function renderQuiz(t){
  const q = t.questions[state.idx];
  const total = t.questions.length;
  const pct = (state.idx/total)*100;
  const sel = state.answers[state.idx];
  root.innerHTML = `
    <div class="screen">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <p class="muted" style="margin:0">${escapeHtml(t.progress)} ${state.idx+1} ${escapeHtml(t.of)} ${total}</p>
        <p class="muted" style="margin:0">${Math.round(pct)}%</p>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      <p class="h2">${escapeHtml(q.q)}</p>
      <div style="display:flex;flex-direction:column;gap:8px" id="opts">
        ${q.a.map((opt,i)=>`<div class="q-card ${sel===i?'sel':''}" data-i="${i}"><div class="dot"></div><div>${escapeHtml(opt)}</div></div>`).join('')}
      </div>
      <button class="btn btn-primary" id="b-next" ${sel===undefined?'disabled':''}>${state.idx===total-1?escapeHtml(t.finish):escapeHtml(t.next)}</button>
    </div>`;
  document.querySelectorAll('#opts .q-card').forEach(el=>{
    el.onclick=()=>{ state.answers[state.idx]=parseInt(el.dataset.i); render(); };
  });
  const nb = document.getElementById('b-next');
  if(nb && !nb.disabled){
    nb.onclick=async ()=>{
      if(state.idx<total-1){ state.idx++; render(); }
      else{
        const s = score();
        const record = {
          name: state.name, id: state.id,
          score: s.correct, total: s.total, pct: s.pct,
          pass: s.pct>=80, takenAt: Date.now(), lang: state.lang
        };
        state._lastSave = await saveRecord(record);
        state.screen='result'; render();
      }
    };
  }
}

function score(){
  const t = T[state.lang];
  let c = 0;
  state.answers.forEach((a,i)=>{ if(a===t.questions[i].c) c++; });
  return { correct:c, total:t.questions.length, pct: Math.round((c/t.questions.length)*100) };
}

function renderResult(t){
  const s = score();
  const pass = s.pct>=80;
  const statusMsg = state._lastSave === 'uploaded' ? `✓ ${escapeHtml(t.uploaded)}` : `↻ ${escapeHtml(t.queued)}`;
  const statusColor = state._lastSave === 'uploaded' ? '#27500a' : '#854f0b';
  root.innerHTML = `
    <div class="screen">
      <p class="h1" style="text-align:center">${escapeHtml(t.result)}</p>
      <p class="score">${s.correct} / ${s.total}</p>
      <p style="text-align:center;margin:0"><span class="pill ${pass?'pill-pass':'pill-fail'}">${pass?escapeHtml(t.passed):escapeHtml(t.failed)} — ${s.pct}%</span></p>
      <p class="muted" style="text-align:center">${escapeHtml(t.passLine)}</p>
      <p class="muted" style="text-align:center;margin:0">${escapeHtml(state.name)} · ${escapeHtml(state.id)}</p>
      <p class="muted" style="text-align:center;margin:0;font-size:12px;color:${statusColor}">${statusMsg}</p>
      <button class="btn btn-secondary" id="b-rev">${escapeHtml(t.review)}</button>
      <button class="btn btn-primary" id="b-retake">${escapeHtml(t.retake)}</button>
    </div>`;
  document.getElementById('b-rev').onclick=()=>{ state.screen='review'; render(); };
  document.getElementById('b-retake').onclick=()=>{ state.screen='start'; state.answers=[]; state.idx=0; render(); };
}

function renderReview(t){
  const items = t.questions.map((q,i)=>{
    const a = state.answers[i];
    return `
      <div class="screen" style="padding:16px">
        <p class="h2" style="font-size:14px">${i+1}. ${escapeHtml(q.q)}</p>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${q.a.map((opt,j)=>{
            let cls = 'q-card';
            if(j===q.c) cls += ' correct';
            else if(j===a) cls += ' wrong';
            return `<div class="${cls}"><div class="dot"></div><div>${escapeHtml(opt)}</div></div>`;
          }).join('')}
        </div>
        <p class="feedback"><strong>${escapeHtml(t.explanation)}:</strong> ${escapeHtml(q.e)}</p>
      </div>`;
  }).join('');
  root.innerHTML = items + `<button class="btn btn-primary" id="b-back" style="margin-top:8px">${escapeHtml(t.retake)}</button>`;
  document.getElementById('b-back').onclick=()=>{ state.screen='start'; state.answers=[]; state.idx=0; render(); };
}

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.onclick=()=>{
    state.lang = b.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.toggle('on', x.dataset.lang===state.lang));
    render();
  };
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

render();
})();
</script>
</body>
</html>
